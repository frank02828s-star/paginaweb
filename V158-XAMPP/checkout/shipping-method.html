<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PCBuilder - Método de envío</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="/assets/css/styles.css" rel="stylesheet"/>
</head>
<body>
<div id="site-header"></div>
<main>
<div class="container checkout-page">
<div class="page-title">
<h1>Método de envío</h1>
</div>
<div class="checkout-top-actions">
<a class="btn btn-secondary checkout-back-btn" href="/cart.html"><i class="fas fa-arrow-left"></i> Volver al carrito</a>
</div>
<section aria-label="Selecciona un método de envío" class="checkout-methods">
<button class="checkout-method-card" data-shipping="pickup" type="button">
<div class="checkout-method-icon">
<i class="fas fa-store"></i>
</div>
<div class="checkout-method-text">
<div class="checkout-method-title">Pickup</div>
<div class="checkout-method-subtitle">
                            (Retiro Personal)
                        </div>
</div>
</button>
<button class="checkout-method-card" data-shipping="delivery" type="button">
<div class="checkout-method-icon">
<i class="fas fa-truck-fast"></i>
</div>
<div class="checkout-method-text">
<div class="checkout-method-title">Delivery</div>
<div class="checkout-method-subtitle">(solo en Caracas)</div>
</div>
</button>
<button class="checkout-method-card" data-shipping="national" type="button">
<div class="checkout-method-icon">
<i class="fas fa-truck"></i>
</div>
<div class="checkout-method-text">
<div class="checkout-method-title">Envío nacional</div>
<div class="checkout-method-subtitle">(Cobro en destino)</div>
</div>
</button>
</section>
</div>
</main>
<div id="site-footer"></div>
<script src="/assets/js/shared/storageKeys.js"></script>
<script src="/assets/js/shared/storage.js"></script>
<script src="/assets/js/shared/cart.js"></script>
<script src="/assets/js/shared/layout.js"></script>
<script src="/assets/js/shared/checkoutGuard.js"></script>
<script>
      // Bloquea acceso directo si no hay carrito o si no vienes del paso anterior
      window.guardCheckoutStep && window.guardCheckoutStep('shipping', '/cart.html');
    </script>

<!-- Modal: Pickup location -->

<script src="/assets/js/pages/shipping-pickup.js"></script><script src="/assets/js/pages/shipping-method.js"></script>    <script src="/assets/js/shared/checkout-modal-effects.js"></script>
</body>
</html>
