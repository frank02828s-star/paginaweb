<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - PCBuilder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/styles.css">
    
</head>
<body>
    <div id="site-header"></div>
<!-- Contenido principal -->
    <main class="container">
        <div class="page-title">
            <h1>Catálogo de Productos</h1>
            <p>Explora todos nuestros componentes y encuentra lo que necesitas para tu PC</p>
        </div>
        
        <div class="catalog-controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar productos...">
                <button id="search-button"><i class="fas fa-search"></i></button>
            </div>
            
            <div class="sort-box">
                <label for="sort-select">Ordenar por:</label>
                <select id="sort-select">
                    <option value="default">Por defecto</option>
                    <option value="price-asc">Precio: Menor a Mayor</option>
                    <option value="price-desc">Precio: Mayor a Menor</option>
                    <option value="name-asc">Nombre: A-Z</option>
                    <option value="name-desc">Nombre: Z-A</option>
                    <option value="rating-desc">Mejor valorados</option>
                </select>
                <button class="clear-filters" id="clear-filters">Limpiar Filtros</button>
            </div>
        </div>
        
        <div class="catalog-container">
            <!-- Sidebar de categorías -->
            <div class="categories-sidebar">
                <div class="categories-card">
                    <div class="categories-header">
                        <h3>Categorías</h3>
                    </div>
                    <ul class="category-list" id="catalog-categories">
                        <!-- Las categorías se cargarán con JavaScript -->
                    </ul>
                </div>
                
                <div class="categories-card">
                    <div class="categories-header">
                        <h3>Filtros</h3>
                    </div>
                    <div class="u-inline-f8d354e012">
                        <div class="u-inline-4a3180e2eb">
                            <label class="u-inline-36277884a1">Precio máximo:</label>
                            <input type="range" id="price-range" min="0" max="2000" value="1000" step="50" class="u-inline-69d66e5b2e">
                            <div class="u-inline-766262f3a2">
                                <span class="u-inline-9177070a2f">$0</span>
                                <span  id="max-price-label" class="u-inline-9177070a2f">$1000</span>
                            </div>
                        </div>
                        <button id="apply-filters" class="u-inline-d48e4f523f">
                            <i class="fas fa-filter"></i> Aplicar Filtros
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Grid de productos -->
            <div class="products-section">
                <div class="products-header">
                    <h2 id="current-category-title">Procesadores</h2>
                    <div class="products-count" id="products-count">Mostrando productos</div>
                </div>
                
                <div class="products-grid" id="products-grid">
                    <!-- Los productos se cargarán con JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>
    <script src="/assets/js/data/inventory.js"></script>
    <script src="/assets/js/shared/storageKeys.js"></script>
<script src="/assets/js/shared/storage.js"></script>
    <script src="/assets/js/shared/cart.js"></script>
    <script src="/assets/js/shared/layout.js"></script>
    <script src="/assets/js/pages/catalog.js"></script>
</body>
</html>
